spring.application.name=e1QuartzIntroduction

## DATASOURCE Configs that you need for the database to run
# I created the quartz_demo database beforehand
spring.datasource.url=jdbc:mysql://localhost:3306/quartz_demo?useSSL=false
spring.datasource.username=root
spring.datasource.password=root


## mail configs you need for the server to run
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=USERNAME_HERE
spring.mail.password=PASSWORD_HERE

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


spring.quartz.scheduler.instance-name=MyScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=5
spring.quartz.job-store-type=jdbc
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.StdJDBCDelegate